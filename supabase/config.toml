# Supabase project config (CLI). Link with: supabase link --project-ref <ref>
# Choose an EU region when creating the project (eu-central-1 / eu-west-1) for
# GDPR data residency.
project_id = "clear-self-serve"

[functions.project-run]
verify_jwt = true

# Owner-triggered research agent: gathers cited evidence + de-identified promotion.
# Membership + entitlement are checked in-function.
[functions.project-research]
verify_jwt = true

# Owner-only: invites respondents to a project (membership checked in-function).
[functions.invite-respondents]
verify_jwt = true

# Public portal: respondents have no Supabase session; the invitation token authorizes.
[functions.respondent]
verify_jwt = false

[functions.stripe-checkout]
verify_jwt = true

# Stripe authenticates the webhook via its signature, not a Supabase JWT.
[functions.stripe-webhook]
verify_jwt = false

# Supabase Auth Send-Email hook: brands the magic-link / signup emails and routes
# them through Brevo. Supabase signs the request (hook secret), so there's no JWT.
[functions.auth-email]
verify_jwt = false

# Owner-only account deletion: cancels Stripe, wipes the caller's workspace(s) and
# storage, then deletes the auth user. Uses the service role in-function.
[functions.delete-account]
verify_jwt = true
