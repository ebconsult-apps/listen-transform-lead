name: Build and Deploy to Hostup

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: npm run build
        env:
          # Vite inlines VITE_* at build time. The anon/publishable key is public
          # (it ships in the browser bundle by design), so these live as repo
          # Actions *Variables*, not secrets. Empty values are harmless — the app
          # just shows a "Setup required" card until they're set.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: https://clear-framework.com
          # live = the client calls the deployed project-run edge function (which
          # holds ANTHROPIC_API_KEY and enforces the cost cap) instead of running
          # the in-browser stub. Requires the edge function deployed with AI_MODE=live.
          VITE_AI_MODE: live
          VITE_BILLING_ENABLED: "false"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H pi.hostup.se >> ~/.ssh/known_hosts

      - name: Deploy site to clear-framework.com
        run: |
          rsync -avz --delete \
            --exclude='book-interest-handler.php' \
            --exclude='mail-handler.php' \
            --exclude='whitepaper-handler.php' \
            --exclude='lead-handler.php' \
            --exclude='book_interests.csv' \
            --exclude='whitepaper_leads.csv' \
            --exclude='qualified_leads.csv' \
            --exclude='book-chapter-handler.php' \
            --exclude='chapter_requests.csv' \
            --exclude='assessment-handler.php' \
            --exclude='assessment_leads.csv' \
            --exclude='brevo-key.php' \
            --exclude='brevo-config.php' \
            --exclude='nurture-emails.php' \
            dist/ dwdda@pi.hostup.se:/home/dwdda/public_html/clear-framework.com/

      - name: Sync PHP handlers to server (always — keep server code in step with the repo)
        run: |
          rsync -avz \
            dist/assessment-handler.php \
            dist/whitepaper-handler.php \
            dist/lead-handler.php \
            dist/book-chapter-handler.php \
            dist/mail-handler.php \
            dist/book-interest-handler.php \
            dist/nurture-emails.php \
            dwdda@pi.hostup.se:/home/dwdda/public_html/clear-framework.com/

      - name: Upload config bootstrap (only if missing — never clobber server config)
        run: |
          for file in brevo-config.php; do
            if [ -f "dist/$file" ]; then
              ssh dwdda@pi.hostup.se "test -f /home/dwdda/public_html/clear-framework.com/$file" || \
                rsync -avz "dist/$file" dwdda@pi.hostup.se:/home/dwdda/public_html/clear-framework.com/
            fi
          done

      - name: Deploy Brevo API key to server
        run: |
          echo '<?php define("BREVO_API_KEY", "${{ secrets.BREVO_API_KEY }}"); ?>' | \
            ssh dwdda@pi.hostup.se 'cat > /home/dwdda/public_html/clear-framework.com/brevo-key.php'

      - name: Deploy redirect for simplelistening.com
        run: |
          echo '<IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{HTTP_HOST} ^(www\.)?simplelistening\.com$ [NC]
            RewriteRule ^(.*)$ https://clear-framework.com/$1 [R=301,L]
          </IfModule>' | ssh dwdda@pi.hostup.se 'cat > /home/dwdda/public_html/.htaccess'
