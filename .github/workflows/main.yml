name: Build and Deploy to Hostup

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H pi.hostup.se >> ~/.ssh/known_hosts

      - name: Deploy site to clear-framework.com
        run: |
          rsync -avz --delete \
            --exclude='book-interest-handler.php' \
            --exclude='mail-handler.php' \
            --exclude='whitepaper-handler.php' \
            --exclude='lead-handler.php' \
            --exclude='book_interests.csv' \
            --exclude='whitepaper_leads.csv' \
            --exclude='qualified_leads.csv' \
            --exclude='book-chapter-handler.php' \
            --exclude='chapter_requests.csv' \
            --exclude='assessment-handler.php' \
            --exclude='assessment_leads.csv' \
            --exclude='brevo-key.php' \
            --exclude='brevo-config.php' \
            --exclude='nurture-emails.php' \
            dist/ dwdda@pi.hostup.se:/home/dwdda/public_html/clear-framework.com/

      - name: Force-upload all PHP handlers
        run: |
          for file in assessment-handler.php whitepaper-handler.php lead-handler.php book-chapter-handler.php mail-handler.php book-interest-handler.php brevo-config.php nurture-emails.php; do
            if [ -f "dist/$file" ]; then
              rsync -avz "dist/$file" dwdda@pi.hostup.se:/home/dwdda/public_html/clear-framework.com/
            fi
          done

      - name: Deploy Brevo API key to server
        run: |
          echo '<?php define("BREVO_API_KEY", "${{ secrets.BREVO_API_KEY }}"); ?>' | \
            ssh dwdda@pi.hostup.se 'cat > /home/dwdda/public_html/clear-framework.com/brevo-key.php'

      - name: Deploy redirect for simplelistening.com
        run: |
          echo '<IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteCond %{HTTP_HOST} ^(www\.)?simplelistening\.com$ [NC]
            RewriteRule ^(.*)$ https://clear-framework.com/$1 [R=301,L]
          </IfModule>' | ssh dwdda@pi.hostup.se 'cat > /home/dwdda/public_html/.htaccess'
