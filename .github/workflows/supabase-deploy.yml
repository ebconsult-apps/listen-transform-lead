name: Deploy Supabase functions

# Deploys the edge functions to the linked Supabase project: project-run (the live
# AI runner), project-research (the research agent), and the respondent-collaboration
# pair (invite-respondents, respondent).
# Stub mode runs the AI engine client-side, but the collaboration functions are needed
# in both modes. The Stripe functions stay undeployed until the billing stage.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: supabase functions deploy project-run project-research invite-respondents respondent auth-email stripe-checkout stripe-webhook delete-account --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
